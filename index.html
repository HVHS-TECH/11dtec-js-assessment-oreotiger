<!DOCTYPE html>
<html lang=en> 
<head>
    <title>Home</title>
    <link rel="icon" type="image/png" href="images/favicon1.png"> 
    <meta charset="UTF-8">
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="detailsBox" id="detailsBox">
            <p>Please fill in your personal details before continuing to order. </p>
            <form onsubmit = "return false;">
                <label for="formName">Name:</label>
                <input type="text" id="nameField" name="formName" placeHolder="Name">
                <br> <br>
                <label for="formName">Money: </label>
                <input type="number" id="moneyField" name="formMoney" placeholder="Money">
                <input type="submit" onClick=details()>
            </form>
            <br> <br>
            <br> <br>
            <button onClick="showOrder()">Go to Order</button>
        </div>

        <div class="orderBox" id="orderBox">
            <p>order</p>
            <button onClick="order" id="chocolateDonut">Chocolate</button>
            <button onClick="order" id="vanillaDonut">Vanilla</button>
            <button onClick="order" id="caramelDonut">Caramel</button>
            <button onClick="showReceipt()">Pay Now</button>
        </div>

        <div class="receiptBox" id="receiptBox">
            <p>Thank you for shopping at Digital Donuts</p>
        </div>

    </div>

    <div id="JavaScriptOutput">

    </div>

<script src="script.js"></script>
</body>
</html>
