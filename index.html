<!DOCTYPE html>
<html lang=en> 
<head>
    <title>Home</title>
    <link rel="icon" type="images/png" href="photos/donut.png"> 
    <meta charset="UTF-8">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <nav>

    </nav>

    <button onClick="window.location.reload()">Restart order</button>
    <form onsubmit = "return false;">
                <label for="formName">Name:</label>
                <input type="number" id="ratingField" name="formRating" min="0" max="5" placeHolder="Rating" required>
                <input type="submit" onClick>
            </form>
    <div class="container">
        <div class="detailsBox" id="detailsBox">
            <p>Please fill in your personal details before continuing to order. </p>
            <form onsubmit = "return false;">
                <label for="formName">Name:</label>
                <input type="text" id="nameField" name="formName" placeHolder="Name" required>
                <br> <br>
                <label for="formName">Money: </label>
                <input type="number" max="10000" min="0" id="moneyField" name="formMoney" placeholder="Money" required>
                <input type="submit" onClick=details()>
            </form>
            <br> <br>
            <br> <br>
            <button onClick="addRemoveDiv(DETAILS_BOX, ORDER_BOX)">Go to Order</button>
            <br> <br>
        </div>

        <div id="Test">


        </div>

        <div class="orderBox" id="orderBox">
            <div class="chocolateBox">
                <button onClick="chocolate()" id="chocolateDonut"><img src = "photos/Donut pink choc.png" alt="Chocolate donut"> <br> Chocolate Donut: $5 <b> &nbsp &nbsp &nbsp +Add</b></button></div>
            <div class="vanillaBox">
                <button onClick="vanilla()" id="vanillaDonut"><img src = "photos/Donut pink vanilla.png" alt="Vanilla donut"> <br> Vanilla Donut: $5 <b> &nbsp &nbsp &nbsp + Add</b></button></div>
            <div class="caramelBox">      
                <button onClick="caramel()" id="caramelDonut"> <img src = "photos/Donut pink caramel.png" alt="Caramel donut"> <br> Caramel Donut: $5 <b> &nbsp &nbsp &nbsp + Add</b></button></div>
            <div class="pinkBox">      
                <button onClick="agePink()" id="pinkDrink"> <img src = "photos/pink drink.png" alt="Pink Drink"> <br> Pink Energy Drink: $5 <b> &nbsp &nbsp &nbsp +Add</b></button></div>
            <div class="lightPinkBox">      
                <button onClick="ageLightPink()" id="lightPinkDrink"> <img src = "photos/light pink drink.png" alt="Light Pink Energy Drink"> <br> Light Pink Energy Drink: $5 <b> &nbsp &nbsp &nbsp + Add</b></button></div>  
            <div class="purpleBox">      
                <button onClick="agePurple()" id="purpleDrink"> <img src = "photos/purple drink.png" alt="Purple Drink"> <br> Purple Drink: $5 <b> &nbsp &nbsp &nbsp +Add</b></button></div>    
            <button onClick="addRemoveDiv(ORDER_BOX, RECEIPT_BOX), receipt()">Pay Now</button>
        </div>

        <div class="receiptBox" id="receiptBox">
            <button onClick = "addRemoveDiv(RECEIPT_BOX, FINISH_BOX)">FINISH</button>
        </div>

    </div>

    <div id="JavaScriptOutput">

    </div>

<script src="script.js"></script>
