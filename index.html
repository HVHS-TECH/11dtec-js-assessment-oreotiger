<!DOCTYPE html>
<html lang=en> 
<head>
    <title>Home</title>
    <link rel="icon" type="images/png" href="photos/donut.png"> 
    <meta charset="UTF-8">
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="detailsBox" id="detailsBox">
            <button onClick="window.location.reload()">Restart order</button>
            <p>Please fill in your personal details before continuing to order. </p>
            <form onsubmit = "return false;">
                <label for="formName">Name:</label>
                <input type="text" id="nameField" name="formName" placeHolder="Name">
                <br> <br>
                <label for="formName">Money: </label>
                <input type="number" id="moneyField" name="formMoney" placeholder="Money">
                <input type="submit" onClick=details()>
            </form>
            <br> <br>
            <br> <br>
            <button onClick="addRemoveDiv(DETAILS_BOX, ORDER_BOX)">Go to Order</button>
        </div>

        <div id="Test">


        </div>

        <div class="orderBox" id="orderBox">
            <button onClick="window.location.reload()">Restart order</button>
            <div class="chocolateBox">
                <img src = "photos/Donut pink choc.png" alt="Chocolate donut">
                <button onClick="chocolate()" id="chocolateDonut">Chocolate: $5</button></div>
            <div class="vanillaBox">
                <img src = "photos/Donut pink vanilla.png" alt="Vanilla donut">
                <button onClick="vanilla()" id="vanillaDonut">Vanilla: $5</button></div>
            <div class=caramelBox>
                <img src = "photos/Donut pink caramel.png" alt="Caramel donut">      
                <button onClick="caramel()" id="caramelDonut">Caramel: $5</button></div>  
            <button onClick="addRemoveDiv(ORDER_BOX, RECEIPT_BOX), receipt()">Pay Now</button>
        </div>

        <div class="receiptBox" id="receiptBox">
            <button onClick="window.location.reload()">Restart order</button>
            
            
        </div>

    </div>

    <div id="JavaScriptOutput">

    </div>

<script src="script.js"></script>
</body>
</html>
