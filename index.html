<!DOCTYPE html>
<html lang=en> 
<head>
    <title>Home</title>
    <link rel="icon" type="image/png" href="images/favicon1.png"> 
    <meta charset="UTF-8">
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="item1">
            <p>Please fill in your personal details before continuing to order. </p>
            <form onsubmit = "return false;">
                <label for="formName">Name:</label>
                <input type="text" id="nameField" name="formName" placeHolder="Name">
                <br> <br>
                <label for="formName">Money: </label>
                <input type="number" id="moneyField" name="formMoney" placeholder="Money">
                <input type="submit" onClick=details()>
            </form>
            <br> <br>
            <button onClick="order()">Order</button>
            <br> <br>
        </div>

        <div class="item2">
            <button onClick="receipt()">Pay Now</button>
        </div>

    </div>

    <div id="JavaScriptOutput">

    </div>

<script src="script.js"></script>
</body>
</html>
